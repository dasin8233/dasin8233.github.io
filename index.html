<style>
  :root{
    --cream:#FBFAF7;
    --blue-pale:#EAF3F7;
    --blue-soft:#9BC6DC;
    --blue-deep:#4C7E96;
    --pink-soft:#F6D2D9;
    --pink-deep:#D98A9B;
    --ink:#2E3A3F;

    --radius-lg:28px;
    --radius-md:18px;
    --radius-sm:12px;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--cream);
    color:var(--ink);
    font-family:'Noto Sans TC', sans-serif;
    font-size:17px;
    line-height:1.8;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.serif{font-family:'Noto Serif TC', serif;}
  a{color:inherit; text-decoration:none;}
  img{max-width:100%;display:block;}
  .wrap{max-width:1120px;margin:0 auto;padding:0 24px;}
  /* focus visibility */
  a:focus-visible, button:focus-visible{outline:3px solid var(--blue-deep); outline-offset:3px;}
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
  }

  /* Header */
  header{
    position:sticky; top:0; z-index:50;
    background:rgba(251,250,247,0.92);
    backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line-c);
  }
  .nav-inner{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 24px; max-width:1120px; margin:0 auto;
  }
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:19px;}
  .brand-mark{
    width:38px;height:38px;border-radius:50%;
    background:conic-gradient(from 200deg, var(--blue-soft), var(--pink-soft), var(--blue-soft));
    display:flex;align-items:center;justify-content:center;
    font-family:'Noto Serif TC',serif; font-weight:700; color:var(--blue-deep); font-size:15px;
  }
  nav.links{display:flex;gap:28px;font-size:15px;font-weight:500;color:var(--ink-muted);}
  nav.links a:hover{color:var(--blue-deep);}
  .nav-cta{display:flex;gap:10px;}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:11px 22px;border-radius:999px;font-weight:700;font-size:15px;
    border:2px solid transparent; cursor:pointer; white-space:nowrap;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .btn:hover{transform:translateY(-2px);}
  .btn-primary{background:var(--blue-deep);color:#fff;box-shadow:0 6px 16px rgba(76,126,150,.28);}
  .btn-pink{background:var(--pink-deep);color:#fff;box-shadow:0 6px 16px rgba(217,138,155,.30);}
  .btn-ghost{background:#fff;color:var(--blue-deep);border-color:var(--blue-soft);}
  .btn-sm{padding:8px 16px;font-size:14px;}
